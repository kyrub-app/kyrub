name: Frontend adjustments validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-adjustments-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload adjusted frontend source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-adjustments-source
          path: src/components/tabs/LegacyKyrubTab.tsx
