name: Apply mobile ERP menu refactor

on:
  push:
    branches:
      - refactor/mobile-erp-menu-react

permissions:
  contents: write

jobs:
  apply-refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply state-driven menu refactor
        run: python scripts/refactor_mobile_erp_menu.py

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "refactor: integrate mobile ERP menu with React state"
          git push
