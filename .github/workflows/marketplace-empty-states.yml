name: Marketplace empty states

on:
  push:
    branches:
      - feat/marketplace-empty-states

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/marketplace-empty-states
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply focused UI patch
        run: python scripts/apply_marketplace_empty_states.py

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Remove temporary automation files
        run: |
          rm scripts/apply_marketplace_empty_states.py
          rm .github/workflows/marketplace-empty-states.yml

      - name: Commit validated change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add guided marketplace empty states"
          git push origin HEAD:feat/marketplace-empty-states
