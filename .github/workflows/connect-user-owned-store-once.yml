name: Connect user-owned store once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/connect-user-owned-store
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Apply authenticated user store integration
        run: python .github/scripts/apply_user_store.py

      - name: Verify legacy store identity is gone
        shell: bash
        run: |
          if grep -R -n -E "['\"]t-3['\"]" src; then
            echo "Legacy t-3 identity remains in src."
            exit 1
          fi

      - name: Validate patch
        run: git diff --check

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run user store Firestore rules tests
        run: >-
          npx firebase-tools@14.22.0 emulators:exec
          --only firestore
          --project kyrub-user-stores-rules-test
          "node --import tsx --test tests/firestore/user-stores.rules.test.ts"

      - name: Commit validated integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/connect-user-owned-store-once.yml
          git rm .github/scripts/apply_user_store.py
          git rm .github/user-store-migration-trigger
          git add src/App.tsx src/components/RetailerPanel.tsx src/types/index.ts
          git commit -m "feat: connect authenticated user store"
          git push origin HEAD:agent/connect-user-owned-store
