name: Fix mobile ERP header layout

on:
  push:
    branches:
      - refactor/mobile-erp-react-navigation

permissions:
  contents: write

jobs:
  fix-layout:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip layout fix]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/mobile-erp-react-navigation
          fetch-depth: 0

      - name: Apply header layout fix
        run: python scripts/fix_mobile_erp_header_layout.py

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit header layout fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "fix: keep mobile ERP header actions aligned"
          git push origin HEAD:refactor/mobile-erp-react-navigation
