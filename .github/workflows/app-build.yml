name: Application build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript, tests and bundle
        run: npm run build > build.log 2>&1

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: application-build-log
          path: build.log
          retention-days: 3
